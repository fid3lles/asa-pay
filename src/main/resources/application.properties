spring.application.name=pay
server.port=8080

# =====================================================================
# Datasource (Postgres via Docker Compose - veja docker-compose.yml)
# =====================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pay
spring.datasource.username=pay
spring.datasource.password=pay
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool Hikari: limita recursos locais para nao derrubar o servico sob carga/dependencia lenta
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=2000

# =====================================================================
# JPA / Hibernate
# =====================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# =====================================================================
# API externa (mock) - a orquestradora chama este endpoint
# =====================================================================
external.api.base-url=http://localhost:9090
external.api.connect-timeout=1s
external.api.read-timeout=2s
# Simulacao da API externa mock (exercita retry/circuit breaker):
# failure-rate entre 0.0 e 1.0; latencia em ms
external.api.simulated-failure-rate=0.0
external.api.simulated-latency-ms=30

# =====================================================================
# Seguranca - HMAC SHA-256 (X-Signature + X-Timestamp anti-replay)
# TROCAR o secret em producao (use variavel de ambiente)
# =====================================================================
security.hmac.enabled=true
security.hmac.secret=dev-secret-troque-em-producao
security.hmac.timestamp-tolerance-seconds=300

# =====================================================================
# Resilience4j - CircuitBreaker (instancia: externalApi)
# Abre quando >=50% das ultimas 20 chamadas falham ou sao lentas (>2s)
# =====================================================================
resilience4j.circuitbreaker.instances.externalApi.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.externalApi.sliding-window-size=20
resilience4j.circuitbreaker.instances.externalApi.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.externalApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.externalApi.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.externalApi.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.externalApi.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.externalApi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.externalApi.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.externalApi.register-health-indicator=true

# =====================================================================
# Resilience4j - Retry (backoff exponencial + jitter contra retry storm)
# =====================================================================
resilience4j.retry.instances.externalApi.max-attempts=3
resilience4j.retry.instances.externalApi.wait-duration=200ms
resilience4j.retry.instances.externalApi.enable-exponential-backoff=true
resilience4j.retry.instances.externalApi.exponential-backoff-multiplier=2
resilience4j.retry.instances.externalApi.enable-randomized-wait=true
resilience4j.retry.instances.externalApi.randomized-wait-factor=0.5
# Retry SOMENTE em falha transitoria. Circuito aberto / bulkhead cheio nao sao re-tentados:
# vao direto ao fallback (falha rapida -> 503).
resilience4j.retry.instances.externalApi.retry-exceptions[0]=com.asa.pay.exception.ExternalApiException

# =====================================================================
# Resilience4j - TimeLimiter (timeout duro nas chamadas externas)
# =====================================================================
resilience4j.timelimiter.instances.externalApi.timeout-duration=3s
resilience4j.timelimiter.instances.externalApi.cancel-running-future=true

# =====================================================================
# Resilience4j - Bulkhead (limite de concorrencia para isolar a dependencia)
# =====================================================================
resilience4j.bulkhead.instances.externalApi.max-concurrent-calls=20
resilience4j.bulkhead.instances.externalApi.max-wait-duration=0

# =====================================================================
# Actuator / Observabilidade
# =====================================================================
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,prometheus
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# =====================================================================
# Tracing OpenTelemetry - exporta via OTLP gRPC para localhost:4317 (Jaeger)
# sampling 1.0 = 100% em dev; reduza em producao
# =====================================================================
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4317
management.otlp.tracing.transport=grpc

# Correlation ID + tracing nos logs (correlationId/traceId/spanId)
logging.pattern.level=%5p [${spring.application.name:},cid=%X{correlationId:-},trace=%X{traceId:-},span=%X{spanId:-}]
